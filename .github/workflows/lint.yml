name: Linter

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '**/*.md'
      - '.scripts/*.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            vendor
            $HOME/.cache/go-build
            $GOPATH/pkg/mod
          key: ${{ runner.os }}-laisky-blog-graphql

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - run: go version
      - run: pwd
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: go mod vendor
      - run: go vet
      - name: Enforce v1 pure-Go invariant (proposal §0)
        run: ./.scripts/check_pure_go.sh
      - name: Enforce §3.7 system_owner predicate (proposal)
        run: ./.scripts/check_system_owner.sh
      - run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - run: go test -bench ./...
