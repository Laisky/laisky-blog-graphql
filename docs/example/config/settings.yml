---
settings:
  secret: 12345
  db:
    blog:
      db: blog
      addr: 100.97.108.34:27018
      user: laisky
      pwd: 1234
    twitter:
      db: twitter
      addr: 100.97.108.34:27018
      user: laisky
      pwd: 1234
    monitor:
      db: monitor
      addr: 100.97.108.34:27018
      user: laisky
      pwd: 1234
    mcp:
      db: mcp
      addr: 127.0.0.1
      user: postgres
      pwd: changeme
  openai:
    base_url: https://api.openai.com # Base URL without /v1 suffix (the code appends /v1/embeddings automatically)
    embedding_model: text-embedding-3-small
  mcp:
    tools:
      web_search:
        enabled: true # Enable/disable web_search tool
      web_fetch:
        enabled: true # Enable/disable web_fetch tool
      ask_user:
        enabled: true # Enable/disable ask_user tool
      get_user_request:
        enabled: true # Enable/disable get_user_request tool
      extract_key_info:
        enabled: true # Enable/disable extract_key_info tool
    user_requests:
      # How long a user request row is kept before TTL pruning deletes it.
      # Optional. Default: 30 (days).
      retention_days: 30
      # How often the retention worker wakes up to sweep expired rows, in seconds.
      # Optional. Default: 21600 (= 6h).
      retention_sweep_seconds: 21600
      images:
        # Master switch for image attachments on get_user_request. When false the
        # compose UI hides image controls and the HTTP layer returns
        # 415 feature_disabled for any multipart submission.
        # Optional. Default: false.
        enabled: false
        minio:
          # Hostname of the MinIO / S3 endpoint (no scheme).
          # Optional. Default: s3.laisky.com.
          endpoint: s3.laisky.com
          # Bucket that owns every image object. Required when `enabled: true`;
          # no default because buckets are deployment-specific.
          bucket: REPLACE_WITH_BUCKET_NAME
          # Object-key prefix under the bucket. Leading / trailing slashes are
          # trimmed. Optional. Default: mcp/user_requests/images.
          prefix: mcp/user_requests/images
          # MinIO access key. Required when `enabled: true`. Must live in a
          # private overlay — never commit real credentials.
          access_key: REPLACE_WITH_ACCESS_KEY
          # MinIO secret key. Required when `enabled: true`. Must live in a
          # private overlay — never commit real credentials.
          secret_key: REPLACE_WITH_SECRET_KEY
          # Use HTTPS against the endpoint. Set to false only for local testing.
          # Optional. Default: true.
          use_ssl: true
        # Per-user quota across live (non-expired) post-normalization bytes.
        # Optional. Default: 104857600 (= 100 MiB).
        per_user_quota_bytes: 104857600
        # Hard raw-byte cap per input image, applied before decode. Same limit
        # applies to uploaded files and URL-fetched bodies.
        # Optional. Default: 20971520 (= 20 MiB).
        per_image_max_bytes: 20971520
        # Maximum attachments per request (files and image_urls combined).
        # Optional. Default: 5.
        max_per_request: 5
        # How many days a MinIO object lives before the bucket lifecycle rule
        # deletes it. Re-uploading the same SHA refreshes this TTL.
        # Optional. Default: 7.
        object_ttl_days: 7
        # Validity window (minutes) of presigned GET URLs handed to AI agents.
        # Optional. Default: 30.
        presign_ttl_minutes: 30
        # How often the DB-side image GC sweeps expired refs, in seconds. Set
        # to 0 to disable the worker. Optional. Default: 3600 (= 1h).
        gc_sweep_seconds: 3600
        url_fetch:
          # Allow plain http:// image_url inputs. Not recommended for
          # production. Optional. Default: false (HTTPS only).
          allow_http: false
          # Maximum number of redirect hops the fetcher will follow per URL.
          # Optional. Default: 3.
          max_redirects: 3
          # Overall deadline for one image_url fetch (headers + body), in
          # seconds. Optional. Default: 15.
          total_timeout_seconds: 15
    extract_key_info:
      enabled: true
      top_k_default: 5
      top_k_limit: 20
      max_materials_size: 1000000
      max_chunk_chars: 1500
      semantic_weight: 0.65
      lexical_weight: 0.35
    files:
      allow_root_wipe: false
      max_payload_bytes: 1048576
      max_file_bytes: 1048576
      max_project_bytes: 104857600
      list_limit_default: 256
      list_limit_max: 2048
      lock_timeout_ms: 2000
      delete_retention_days: 7
      search:
        enabled: true
        limit_default: 5
        limit_max: 20
        vector_candidates: 30
        bm25_candidates: 30
        fallback:
          semantic_weight: 0.65
          lexical_weight: 0.35
        rerank:
          model: rerank-v3.5
          endpoint: https://oneapi.laisky.com/v1/rerank
          timeout_ms: 10000
      index:
        workers: 2
        batch_size: 32
        retry_max: 5
        retry_backoff_ms: 1000
        slo_p95_seconds: 30
      security:
        encryption_keks:
          '1': REPLACE_WITH_BASE64_32BYTE_SECRET
          '2': REPLACE_WITH_NEXT_ROTATED_SECRET # largest KEK ID is used for new encryptions
        credential_cache_prefix: mcp:files:cred
        credential_cache_ttl_seconds: 300
  web:
    url_prefix: /mcp # internal mount path on the Go server
    public_url_prefix: / # set to '/' to hide the prefix in generated links
    github_oauth:
      client_id: YOUR_GITHUB_OAUTH_CLIENT_ID
      client_secret: YOUR_GITHUB_OAUTH_CLIENT_SECRET
      redirect_url: https://sso.laisky.com/github/callback
    webauthn:
      origin: https://sso.laisky.com
      rp_id: sso.laisky.com
      rp_display_name: Laisky SSO
    sites:
      mcp:
        host: mcp.laisky.com
        title: Laisky MCP
        favicon: https://s3.laisky.com/uploads/2025/12/mcp_icon.png
        theme: mcp
        router: mcp
        public_base_path: /
      sso:
        host: sso.laisky.com
        title: Laisky SSO
        favicon: https://s3.laisky.com/uploads/2025/12/sso_icon.png
        theme: sso
        router: sso
        public_base_path: /
        turnstile_site_key: YOUR_CLOUDFLARE_TURNSTILE_SITE_KEY
        turnstile_secret_key: YOUR_CLOUDFLARE_TURNSTILE_SECRET_KEY
  websearch:
    max_retry: 3 # default: 3
    engines:
      my_google: # engine name (unique identifier)
        type: google # required: engine type (google, serp_google, firecrawl)
        enabled: true # default: false
        priority: 1 # lower numbers indicate higher priority; default is 1
        api_key: YOUR_GOOGLE_API_KEY
        cx: YOUR_PROGRAMMABLE_SEARCH_ENGINE_ID
      my_firecrawl: # https://docs.firecrawl.dev/api-reference/endpoint/search
        type: firecrawl
        enabled: true
        priority: 2
        api_key: YOUR_FIRECRAWL_API_KEY
        limit: 10 # optional: number of web results to request (1-100); default is 10
      my_serp_1: # you can configure multiple engines of the same type
        type: serp_google
        enabled: true
        priority: 2
        api_key: YOUR_SERP_API_KEY_1
      my_serp_2:
        type: serp_google
        enabled: true
        priority: 2
        api_key: YOUR_SERP_API_KEY_2
